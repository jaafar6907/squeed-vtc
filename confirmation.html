<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Réservation confirmée — Squeed</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #f9fafb; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.box { background: #fff; border-radius: 16px; border: 0.5px solid rgba(0,0,0,0.08); padding: 48px 40px; text-align: center; max-width: 520px; width: 100%; }
.icon { width: 72px; height: 72px; border-radius: 50%; background: #DEF7EC; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
h1 { font-size: 22px; font-weight: 500; margin-bottom: 8px; }
.sub { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
.recap { background: #f9fafb; border-radius: 10px; padding: 16px 20px; text-align: left; margin-bottom: 24px; }
.recap-row { font-size: 13px; color: #6b7280; padding: 4px 0; display: flex; justify-content: space-between; }
.recap-row span { color: #111; font-weight: 500; }
.btn { display: block; width: 100%; background: #1a56db; color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; text-decoration: none; text-align: center; }
.btn:hover { background: #1e40af; }
.loading { color: #6b7280; font-size: 13px; }
</style>
</head>
<body>
<div class="box">
  <div class="icon"><i class="ti ti-circle-check" style="font-size:36px;color:#057a55"></i></div>
  <h1>Réservation confirmée !</h1>
  <p class="sub">Un e-mail de confirmation a été envoyé à votre adresse.<br>L'équipe Squeed vous contactera sous peu.</p>
  <div class="recap" id="recap">
    <div class="loading"><i class="ti ti-loader" style="margin-right:6px"></i> Chargement des détails...</div>
  </div>
  <a href="index.html" class="btn">+ Nouvelle réservation</a>
</div>
<script>
(async function(){
  var params = new URLSearchParams(window.location.search);
  var sessionId = params.get('session_id');
  var recap = document.getElementById('recap');
  if(!sessionId){
    recap.innerHTML = '<div class="recap-row">Merci pour votre réservation !</div>';
    return;
  }
  try {
    var res = await fetch('/api/get-session?session_id=' + sessionId);
    var data = await res.json();
    if(data && data.metadata){
      var m = data.metadata;
      recap.innerHTML =
        '<div class="recap-row">Trajet <span>' + (m.depart||'—') + ' → ' + (m.destination||'—') + '</span></div>' +
        '<div class="recap-row">Véhicule <span>' + (m.vehicule||'—') + '</span></div>' +
        '<div class="recap-row">Date <span>' + (m.date||'—') + '</span></div>' +
        '<div class="recap-row">Passagers <span>' + (m.pax||'—') + '</span></div>' +
        '<div class="recap-row" style="border-top:0.5px solid #e5e7eb;margin-top:8px;padding-top:10px;font-size:14px;font-weight:600;color:#111">Total payé <span style="color:#16a34a">EUR ' + (data.amount_total ? (data.amount_total/100).toFixed(2) : '—') + '</span></div>';
    } else {
      recap.innerHTML = '<div class="recap-row">Paiement reçu avec succès. Merci !</div>';
    }
  } catch(e) {
    recap.innerHTML = '<div class="recap-row">Paiement reçu avec succès. Merci !</div>';
  }
})();
</script>
</body>
</html>
